# Deployment compose for the Docker host — pulls the prebuilt image from
# GHCR instead of building from source. Usage on the VM:
#   docker compose -f docker-compose.deploy.yml pull
#   docker compose -f docker-compose.deploy.yml up -d
# Needs a .env file alongside it (copy .env.example).

x-app-env: &app-env
  DB_HOST: db
  DB_NAME: ${DB_NAME:-ssanta}
  DB_USER: ${DB_USER:-ssanta}
  DB_PASS: ${DB_PASS:?set DB_PASS in .env}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-465}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
  SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Secret Santa}
  SITE_URL: ${SITE_URL:-}
  PHOTO_MAX_MB: ${PHOTO_MAX_MB:-30}
  SESSION_DAYS: ${SESSION_DAYS:-15}
  TZ: ${TZ:-Europe/London}

services:
  app:
    image: ghcr.io/copex-uk/secret-santa-webapp:${APP_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    environment: *app-env
    volumes:
      - config:/var/www/private/config
      - uploads:/var/www/html/uploads
    depends_on:
      db:
        condition: service_healthy

  cron:
    image: ghcr.io/copex-uk/secret-santa-webapp:${APP_TAG:-latest}
    restart: unless-stopped
    entrypoint: >
      sh -c 'while true; do
        php /var/www/private/cron/send_reveal_emails.php || true;
        sleep 300;
      done'
    environment: *app-env
    volumes:
      - config:/var/www/private/config
      - uploads:/var/www/html/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-ssanta}
      MARIADB_USER: ${DB_USER:-ssanta}
      MARIADB_PASSWORD: ${DB_PASS:?set DB_PASS in .env}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASS:?set DB_ROOT_PASS in .env}
      TZ: ${TZ:-Europe/London}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  config:
  uploads:
  dbdata:
